name: Auto-Fix Pipeline

on:
  repository_dispatch:
    types: [posthog_error]

jobs:
  fix-error:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install openai

      - name: Run Coding Agent
        # Values are passed as env vars, never interpolated into the shell command,
        # which prevents shell injection via attacker-controlled webhook payloads.
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIX_FILE_NAME: ${{ github.event.client_payload.file_name }}
          FIX_ERROR_MESSAGE: ${{ github.event.client_payload.error_message }}
          FIX_TRACEBACK: ${{ github.event.client_payload.traceback }}
        run: |
          python agent.py | tee /tmp/agent_output.txt
          # Extract which file was patched so we stage only that file
          FIXED=$(grep '^FIXED_FILE=' /tmp/agent_output.txt | cut -d= -f2-)
          echo "FIXED_FILE=$FIXED" >> "$GITHUB_ENV"

      - name: Commit and push changes
        run: |
          git config user.name "AutoFix Agent"
          git config user.email "autofix@agent.local"
          if [ -n "$FIXED_FILE" ] && [ -f "$FIXED_FILE" ]; then
            git add "$FIXED_FILE"
          else
            echo "No patched file identified; nothing to commit."
            exit 0
          fi
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "fix: auto-fix applied for error in $FIXED_FILE"
          git push
